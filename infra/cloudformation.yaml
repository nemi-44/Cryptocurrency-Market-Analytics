AWSTemplateFormatVersion: "2010-09-09"
Description: Crypto trend and spike analytics ingestion and serving resources.

Parameters:
  ProjectName:
    Type: String
    Default: crypto-analytics
  KinesisShardCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10

Resources:
  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadForStaticWebsite
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${DashboardBucket.Arn}/*"

  MarketDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub "${ProjectName}-market-events"
      RetentionPeriodHours: 24
      ShardCount: !Ref KinesisShardCount
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ServingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-serving"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: window_end
          AttributeType: S
        - AttributeName: result_key
          AttributeType: S
        - AttributeName: result_type
          AttributeType: S
      KeySchema:
        - AttributeName: window_end
          KeyType: HASH
        - AttributeName: result_key
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: result-type-index
          KeySchema:
            - AttributeName: result_type
              KeyType: HASH
            - AttributeName: window_end
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: firehose-kinesis-s3
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:DescribeStreamSummary
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:ListShards
                Resource: !GetAtt MarketDataStream.Arn
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt RawBucket.Arn
                  - !Sub "${RawBucket.Arn}/*"

  RawDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub "${ProjectName}-raw-archive"
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt MarketDataStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt RawBucket.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
        CompressionFormat: GZIP
        Prefix: "raw/date=!{timestamp:yyyy-MM-dd}/hour=!{timestamp:HH}/symbol=!{partitionKeyFromQuery:symbol}/"
        ErrorOutputPrefix: "errors/!{firehose:error-output-type}/date=!{timestamp:yyyy-MM-dd}/"
        BufferingHints:
          IntervalInSeconds: 60
          SizeInMBs: 64
        DynamicPartitioningConfiguration:
          Enabled: true
        ProcessingConfiguration:
          Enabled: true
          Processors:
            - Type: MetadataExtraction
              Parameters:
                - ParameterName: MetadataExtractionQuery
                  ParameterValue: "{symbol:.symbol}"
                - ParameterName: JsonParsingEngine
                  ParameterValue: JQ-1.6

  AppRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: app-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:DescribeStreamSummary
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:ListShards
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !GetAtt MarketDataStream.Arn
              - Effect: Allow
                Action:
                  - dynamodb:BatchWriteItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt ServingTable.Arn
                  - !Sub "${ServingTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !GetAtt RawBucket.Arn
                  - !Sub "${RawBucket.Arn}/*"

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AppRole

  DashboardApiRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: dashboard-api-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !GetAtt ServingTable.Arn
                  - !Sub "${ServingTable.Arn}/index/*"

  DashboardApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-dashboard-api"
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt DashboardApiRole.Arn
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ServingTable
      Code:
        ZipFile: |
          import json
          import os
          from decimal import Decimal

          def decimal_to_json(value):
              if isinstance(value, Decimal):
                  return int(value) if value % 1 == 0 else float(value)
              if isinstance(value, dict):
                  return {key: decimal_to_json(item) for key, item in value.items()}
              if isinstance(value, list):
                  return [decimal_to_json(item) for item in value]
              return value

          def response(status_code, payload):
              return {
                  "statusCode": status_code,
                  "headers": {
                      "Access-Control-Allow-Origin": "*",
                      "Access-Control-Allow-Headers": "content-type",
                      "Access-Control-Allow-Methods": "GET,OPTIONS",
                      "Content-Type": "application/json",
                      "Cache-Control": "no-store",
                  },
                  "body": json.dumps(payload, separators=(",", ":"), sort_keys=True),
              }

          def latest_payload_from_items(items):
              converted = [decimal_to_json(item) for item in items]
              if not converted:
                  return {"trending": [], "spikes": [], "latest_window": None}
              latest_window = max(str(item.get("window_end", "")) for item in converted)
              latest = [item for item in converted if str(item.get("window_end", "")) == latest_window]
              trending = sorted(
                  [item for item in latest if item.get("result_type") == "trend"],
                  key=lambda item: int(item.get("rank", 9999)),
              )
              spikes = sorted(
                  [item for item in latest if item.get("result_type") == "spike"],
                  key=lambda item: int(item.get("rank", 9999)),
              )
              return {"trending": trending, "spikes": spikes, "latest_window": latest_window}

          def handler(event, context):
              method = event.get("requestContext", {}).get("http", {}).get("method", event.get("httpMethod", "GET"))
              if method == "OPTIONS":
                  return response(204, {})

              import boto3
              table = boto3.resource("dynamodb").Table(os.environ["DYNAMODB_TABLE_NAME"])
              items = []
              scan_kwargs = {"Limit": 500}
              while True:
                  result = table.scan(**scan_kwargs)
                  items.extend(result.get("Items", []))
                  if "LastEvaluatedKey" not in result or len(items) >= 500:
                      break
                  scan_kwargs["ExclusiveStartKey"] = result["LastEvaluatedKey"]
              return response(200, latest_payload_from_items(items))

  DashboardHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${ProjectName}-dashboard-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - content-type

  DashboardApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref DashboardHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DashboardApiFunction.Arn}/invocations"
      PayloadFormatVersion: "2.0"

  DashboardApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DashboardHttpApi
      RouteKey: "GET /latest"
      Target: !Sub "integrations/${DashboardApiIntegration}"

  DashboardApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref DashboardHttpApi
      StageName: "$default"
      AutoDeploy: true

  DashboardApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DashboardApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${DashboardHttpApi}/*/*/latest"

Outputs:
  RawBucketName:
    Value: !Ref RawBucket
  KinesisStreamName:
    Value: !Ref MarketDataStream
  DynamoDbTableName:
    Value: !Ref ServingTable
  AppInstanceProfile:
    Value: !Ref AppInstanceProfile
  DashboardBucketName:
    Value: !Ref DashboardBucket
  DashboardWebsiteUrl:
    Value: !GetAtt DashboardBucket.WebsiteURL
  ApiEndpoint:
    Value: !Sub "https://${DashboardHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  ApiLatestUrl:
    Value: !Sub "https://${DashboardHttpApi}.execute-api.${AWS::Region}.amazonaws.com/latest"
